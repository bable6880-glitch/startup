version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --prefer-offline
    build:
      commands:
        - echo "DATABASE_URL=$DATABASE_URL"
        - echo "UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL"
        - npm run build
  environmentVariables:
    NEXT_PUBLIC_BASE_URL: https://main.d3rcns8buqla6w.amplifyapp.com
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*