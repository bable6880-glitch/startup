version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --prefer-offline
    build:
      commands:
        - env | grep -E '^DATABASE_URL|^FIREBASE_|^UPSTASH_|^STRIPE_|^NEXT_PUBLIC_|^CRON_|^CLOUDINARY_' >> .env.production
        - npm run build
  environmentVariables:
    NEXT_PUBLIC_BASE_URL: https://main.d3rcns8buqla6w.amplifyapp.com
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*