version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --prefer-offline
    build:
      commands:
        # Verify NEXT_PUBLIC_BASE_URL is set in Amplify Console > Environment Variables
        # Note: middleware renamed from middleware.ts → proxy.ts to avoid Amplify naming conflicts
        - echo "NEXT_PUBLIC_BASE_URL=$NEXT_PUBLIC_BASE_URL"
        - 'if [ -z "$NEXT_PUBLIC_BASE_URL" ]; then echo "WARNING: NEXT_PUBLIC_BASE_URL is not set!"; fi'
        - npm run build
  environmentVariables:
    NEXT_PUBLIC_BASE_URL: https://main.d3rcns8buqla6w.amplifyapp.com
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
